# ─────────────────────────────────────────────────────────────
#  GenZ Player — CI/CD Build Workflow
#  Triggers:
#    • Every push to main       → build & upload artifact
#    • Every tag  vX.Y.Z        → build + create GitHub Release
# ─────────────────────────────────────────────────────────────

name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

permissions:
  contents: write   # needed to create GitHub Releases

jobs:

  # ── 1. BUILD ──────────────────────────────────────────────
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      # 1. Checkout source — full history so SignPath can verify provenance
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Python (uv handles the exact version from .python-version)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          allow-prereleases: true

      # 3. Install uv (fast, lock-file-based installer)
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # 4. Install all dependencies from the lock file (reproducible)
      - name: Install dependencies
        run: uv sync --frozen

      # 5. Build the Windows executable (folder output)
      - name: Build EXE with PyInstaller
        run: |
          uv run pyinstaller `
            --windowed `
            --name "GenZ Player" `
            --icon "GenZ Player.ico" `
            --add-data "settings.json;." `
            main.py

      # 6. Verify the binary was actually produced
      - name: Verify build output
        run: |
          if (!(Test-Path "dist\GenZ Player\GenZ Player.exe")) {
            Write-Error "Build failed: dist\GenZ Player\GenZ Player.exe not found"
            exit 1
          }
          Write-Host "Build successful: $(Get-Item 'dist\GenZ Player\GenZ Player.exe' | Select-Object -ExpandProperty Length) bytes"

      # 7. Zip the output folder for clean distribution
      - name: Zip build output
        run: |
          Compress-Archive -Path "dist\GenZ Player\*" -DestinationPath "dist\GenZ-Player-Windows.zip"

      # 8. Upload artifact (available for every build, not just releases)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GenZ-Player-Windows
          path: "dist/GenZ-Player-Windows.zip"
          retention-days: 30
          if-no-files-found: error


  # ── 2. RELEASE (tags only) ────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      # 1. Checkout for release notes
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Download the zip artifact produced by the build job
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: GenZ-Player-Windows
          path: dist/

      # 3. Extract tag version (strips leading 'v')
      - name: Get version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT

      # 4. Publish the GitHub Release with the signed-ready EXE attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GenZ Player v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## GenZ Player v${{ steps.version.outputs.version }}

            A free, open-source video and audio player built with Python & PyQt6.

            ### Download
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `GenZ-Player-Windows.zip` (see Assets below) |

            > Extract the zip and run `GenZ Player.exe` — no installation needed.

            ### Code Signing
            Free code signing provided by [SignPath.io](https://about.signpath.io),
            certificate by [SignPath Foundation](https://signpath.org).

            ### Verification
            After downloading, right-click the `.exe` → **Properties** →
            **Digital Signatures** tab to verify the SignPath Foundation signature.

            ### Privacy
            This program does not transfer any information to other networked systems
            unless specifically requested by the user.
          files: |
            dist/GenZ-Player-Windows.zip